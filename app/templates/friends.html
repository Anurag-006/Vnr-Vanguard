<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Leaderboard | VNR Vanguard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161b2c;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        h1 { font-size: 2.5rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .nav-links { margin-top: 15px; }
        .nav-links a { color: var(--accent); text-decoration: none; font-weight: 600; }

        /* --- Input Section --- */
        .input-section {
            background: var(--surface);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label { color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
        
        select, textarea {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        textarea { font-family: 'Courier New', monospace; min-height: 120px; resize: vertical; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        .fetch-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .fetch-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px var(--accent-glow); }

        /* --- Results Table --- */
        .table-container {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; background: rgba(255, 255, 255, 0.02); }
        td { padding: 18px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .rank-badge { background: #1e293b; padding: 6px 12px; border-radius: 8px; font-weight: 600; color: var(--accent); }
        .sgpa-pill { background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 8px 16px; border-radius: 99px; font-weight: 800; }
        .withheld { color: var(--danger); font-style: italic; }

        a.student-link { color: var(--text-main); text-decoration: none; font-weight: 600; }
        a.student-link:hover { color: var(--accent); }

    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h1>Squad Leaderboard</h1>
        <div class="nav-links">
            <a href="/">← Back to Class Standings</a>
        </div>
    </div>

    <form action="/friends" method="POST" class="input-section">
        <div>
            <label for="exam">Academic Session</label>
            <select name="exam" id="exam" style="width: 100%; margin-top: 8px;">
                {% for eid, ename in available_exams.items() %}
                    <option value="{{ eid }}" {% if eid == selected_exam %}selected{% endif %}>{{ ename }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="roll_numbers">Enter Roll Numbers (Comma, space, or new line separated)</label>
            <textarea id="roll_numbers" name="roll_numbers" placeholder="Paste roll numbers from WhatsApp or Excel here..." style="margin-top: 8px;">{{ saved_input }}</textarea>
        </div>

        <button type="submit" class="fetch-btn">🔥 Calculate Squad Rankings</button>
    </form>

    {% if students %}
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Roll Number</th>
                    <th>Name</th>
                    <th>SGPA</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td><span class="rank-badge">#{{ loop.index }}</span></td>
                    <td style="color: var(--text-dim);">{{ s.roll }}</td>
                    <td>
                        {% if s.name == "Result Withheld" %}
                            <span class="withheld">{{ s.name }}</span>
                        {% else %}
                            <a href="/report/{{ s.roll }}?exam={{ selected_exam }}" target="_blank" class="student-link">{{ s.name }}</a>
                        {% endif %}
                    </td>
                    <td>
                        <span class="{% if s.sgpa == 'Withheld' %}withheld{% else %}sgpa-pill{% endif %}">
                            {{ s.sgpa }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}
</div>

<script>
    const textArea = document.getElementById('roll_numbers');
    
    // Load cached friends from LocalStorage if textarea is empty
    if (textArea.value.trim() === "") {
        const savedFriends = localStorage.getItem('vnr_squad_cache');
        if (savedFriends) textArea.value = savedFriends;
    }

    // Auto-save to LocalStorage on every input change
    textArea.addEventListener('input', function() {
        localStorage.setItem('vnr_squad_cache', textArea.value);
    });
</script>

</body>
</html>
